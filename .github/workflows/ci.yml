name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ─────────────────────────────────────────
  # Job 1: 테스트
  # 모든 테스트가 @WebMvcTest / MockitoExtension 기반이라 DB 불필요.
  # MySQL service 는 제거함 — 실제로 사용되지 않았고 워크플로우 시작을 30~60초 지연시켰음.
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test

  # ─────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & Docker Hub 푸시
  # main 브랜치 push 이고 test 가 통과했을 때만 실행.
  # PR 머지가 아닌 직접 push 도 포함 (develop 제외).
  # ─────────────────────────────────────────
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 태그 전략: latest + 커밋 SHA 7자리 (롤백 가능)
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 3: EC2 배포
  # build-and-push 가 끝난 뒤 SSH 로 EC2 에 접속해 deploy.sh 실행.
  #
  # deploy.sh 동작 시퀀스:
  #   1) 현재 라이브 슬롯(blue/green) 판별
  #   2) 대기 슬롯에 새 컨테이너 실행 (APP_IMAGE_TAG=커밋 SHA)
  #   3) 컨테이너 헬스체크 통과 대기
  #   4) nginx upstream 교체 → reload (무중단)
  #   5) 기존 슬롯 컨테이너 종료
  # ─────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 최신 deploy.sh + docker-compose.yml + nginx 설정을 EC2 로 복사 (EC2 에 git 없음)
      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,deploy.sh,nginx/"
          target: ~/pinq_backend/

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/pinq_backend
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}
