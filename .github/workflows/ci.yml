name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ─────────────────────────────────────────
  # Job 1: 테스트
  # 모든 테스트가 @WebMvcTest / MockitoExtension 기반이라 DB 불필요.
  # MySQL service 는 제거함 — 실제로 사용되지 않았고 워크플로우 시작을 30~60초 지연시켰음.
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test

  # ─────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & Docker Hub 푸시
  # main 브랜치 push 이고 test 가 통과했을 때만 실행.
  # PR 머지가 아닌 직접 push 도 포함 (develop 제외).
  # ─────────────────────────────────────────
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JAR 는 러너에서 네이티브로 1회 빌드 — 자바 바이트코드는 아치 독립이라
      # amd64/arm64 이미지가 같은 JAR 를 공유한다 (Dockerfile.ci 참고)
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build bootJar
        run: chmod +x gradlew && ./gradlew bootJar -x test

      # arm64 이미지 레이어 조립용 에뮬레이션 (Oracle Cloud Ampere A1 서버 대상)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 태그 전략: latest + 커밋 SHA 7자리 (롤백 가능)
      # 멀티아치: amd64(기존 EC2) + arm64(Oracle Ampere A1) — 서버가 자기 아치에 맞는
      # 이미지를 자동으로 pull 하므로 이전 중에도 양쪽 모두 배포 가능하다.
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 3: EC2 배포
  # build-and-push 가 끝난 뒤 SSH 로 EC2 에 접속해 deploy.sh 실행.
  #
  # deploy.sh 동작 시퀀스:
  #   1) 현재 라이브 슬롯(blue/green) 판별
  #   2) 대기 슬롯에 새 컨테이너 실행 (APP_IMAGE_TAG=커밋 SHA)
  #   3) 컨테이너 헬스체크 통과 대기
  #   4) nginx upstream 교체 → reload (무중단)
  #   5) 기존 슬롯 컨테이너 종료
  # ─────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 최신 deploy.sh + docker-compose.yml + nginx 템플릿을 EC2 로 복사 (EC2 에 git 없음).
      # nginx/upstream.conf 는 현재 라이브 슬롯을 담는 런타임 상태 파일이라 덮어쓰지 않는다.
      # scripts/migration/ 은 아래 "Prepare EC2" 단계의 멱등 마이그레이션에 사용된다.
      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,deploy.sh,nginx/entrypoint.sh,nginx/nginx.conf,nginx/nginx.conf.template,nginx/upstream-blue.conf,nginx/upstream-green.conf,scripts/migration"
          target: ~/pinq_backend/

      # 배포 '전' 준비 — 순서 중요 (운영은 ddl-auto=validate 라 스키마가 먼저 있어야 새 앱이 뜬다):
      #   1) FIREBASE_SERVICE_ACCOUNT_BASE64 시크릿을 .env 에 동기화 (시크릿 미설정 시 건너뜀)
      #   2) 아직 적용 안 된 DB 마이그레이션 실행 (information_schema 로 멱등 가드)
      - name: Prepare EC2 (env sync + DB migrations)
        uses: appleboy/ssh-action@v1.0.3
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: FIREBASE_SERVICE_ACCOUNT_BASE64
          # 원격 스크립트 실패를 스텝 실패로 반드시 전파 — 배포 실패가 success 로
          # 위장되던 사고(2026-07-11, trial_quiz validate 실패가 성공으로 보고됨) 방지
          script_stop: true
          script: |
            set -e
            cd ~/pinq_backend

            # ── 1) FCM 서비스 계정 시크릿 → .env (멱등: 있으면 갱신, 없으면 추가) ──
            if [ -n "$FIREBASE_SERVICE_ACCOUNT_BASE64" ]; then
              if grep -q '^FIREBASE_SERVICE_ACCOUNT_BASE64=' .env; then
                sed -i "s|^FIREBASE_SERVICE_ACCOUNT_BASE64=.*|FIREBASE_SERVICE_ACCOUNT_BASE64=$FIREBASE_SERVICE_ACCOUNT_BASE64|" .env
              else
                printf 'FIREBASE_SERVICE_ACCOUNT_BASE64=%s\n' "$FIREBASE_SERVICE_ACCOUNT_BASE64" >> .env
              fi
              echo "OK: FIREBASE_SERVICE_ACCOUNT_BASE64 -> .env 동기화"
            else
              echo "SKIP: FIREBASE_SERVICE_ACCOUNT_BASE64 시크릿 미설정 — FCM 푸시 비활성 상태로 배포됩니다"
            fi

            # ── 2) 대기 중인 DB 마이그레이션 (컬럼 존재 여부로 멱등 가드) ──
            set -a; . ./.env; set +a
            MYSQL_CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 -i mysql)
            echo "MySQL 컨테이너: $MYSQL_CONTAINER"
            col_exists() {
              docker exec "$MYSQL_CONTAINER" mysql -N -u"$DB_USERNAME" -p"$DB_PASSWORD" -e \
                "SELECT COUNT(*) FROM information_schema.COLUMNS WHERE TABLE_SCHEMA='$DB_NAME' AND TABLE_NAME='$1' AND COLUMN_NAME='$2'" 2>/dev/null
            }
            if [ "$(col_exists quiz category)" = "0" ]; then
              docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
                < scripts/migration/2026-07-07-add-quiz-category.sql
              echo "OK: quiz-category 마이그레이션 적용"
            else
              echo "SKIP: quiz.category 이미 존재"
            fi
            if [ "$(col_exists users notification_enabled)" = "0" ]; then
              docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
                < scripts/migration/2026-07-07-add-notification.sql
              echo "OK: notification 마이그레이션 적용"
            else
              echo "SKIP: users.notification_enabled 이미 존재"
            fi

            # 타임스탬프 +9h 오염 보정 — 쿼리 자체가 멱등(미래 값만 보정)이라 매 배포 실행
            docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
              < scripts/migration/2026-07-08-fix-timestamp-shift.sql
            echo "OK: 타임스탬프 오염 보정 실행 (오염 행 없으면 no-op)"

            # 오답 복습 테이블 + 기존 오답 백필 — CREATE IF NOT EXISTS / INSERT NOT EXISTS 로 멱등
            docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
              < scripts/migration/2026-07-08-add-review-item.sql
            echo "OK: review_item 마이그레이션 실행"

            # 복습 보상(졸업 카운터 + 일별 로그) — users 컬럼은 ADD COLUMN 이라 존재 가드 필요
            if [ "$(col_exists users graduated_review_count)" = "0" ]; then
              docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
                < scripts/migration/2026-07-08-add-review-rewards.sql
              echo "OK: review-rewards 마이그레이션 적용"
            else
              echo "SKIP: users.graduated_review_count 이미 존재"
            fi

            # dry-run 실험 로그 테이블 — IF NOT EXISTS 로 멱등, 매 배포 실행
            docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
              < scripts/migration/2026-07-11-add-trial-quiz.sql
            echo "OK: trial_quiz 마이그레이션 실행"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 배포 실패의 success 위장 방지 (Prepare 스텝과 동일)
          script_stop: true
          script: |
            set -e
            cd ~/pinq_backend
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}

            # 배포 '후' 타임스탬프 보정 재실행 — 배포 전 보정과 새 컨테이너 기동 사이에
            # 구버전 컨테이너가 쓴 오염 행(+9h)까지 마저 잡는다 (쿼리 멱등)
            set -a; . ./.env; set +a
            MYSQL_CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 -i mysql)
            docker exec -i "$MYSQL_CONTAINER" mysql -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" \
              < scripts/migration/2026-07-08-fix-timestamp-shift.sql
            echo "OK: 배포 후 타임스탬프 보정 완료"
