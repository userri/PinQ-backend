name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ─────────────────────────────────────────
  # Job 1: 테스트
  # 모든 테스트가 @WebMvcTest / MockitoExtension 기반이라 DB 불필요.
  # MySQL service 는 제거함 — 실제로 사용되지 않았고 워크플로우 시작을 30~60초 지연시켰음.
  # ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test

  # ─────────────────────────────────────────
  # Job 2: Docker 이미지 빌드 & Docker Hub 푸시
  # main 브랜치 push 이고 test 가 통과했을 때만 실행.
  # PR 머지가 아닌 직접 push 도 포함 (develop 제외).
  # ─────────────────────────────────────────
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 태그 전략: latest + 커밋 SHA 7자리 (롤백 가능)
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 3: EC2 배포
  # build-and-push 가 끝난 뒤 SSH 로 EC2 에 접속해 컨테이너를 교체.
  #
  # EC2에서 실행되는 배포 스크립트 설명:
  #   1) resources_default 네트워크가 없으면 생성 (MySQL 컨테이너와 같은 네트워크여야 통신 가능)
  #   2) 새 이미지 pull
  #   3) 기존 app 컨테이너만 중단 (DB 컨테이너는 건드리지 않음)
  #   4) docker compose up 으로 app 컨테이너 재기동
  #   5) 30초 후 헬스체크 — 실패 시 즉시 exit 1 로 워크플로우를 빨간불로 만듦
  # ─────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # 1) 외부 네트워크 보장 (MySQL 컨테이너와 공유하는 네트워크)
            docker network inspect resources_default >/dev/null 2>&1 \
              || docker network create resources_default

            # 2) 새 이미지 pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pinq-backend:latest

            # 3) 기존 app 컨테이너만 중단·제거 (DB는 별도 관리)
            cd ~/pinq_backend
            docker compose stop app
            docker compose rm -f app

            # 4) 재기동
            docker compose up -d app

            # 5) 헬스체크 (최대 60초 대기)
            echo "Waiting for app to start..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "✅ Deploy successful"
                exit 0
              fi
              echo "  attempt $i/12..."
              sleep 5
            done
            echo "❌ Health check failed after 60s"
            exit 1