# Phase 1 테스트 전용 프로파일.
# H2 인메모리 DB 로 빠르게 동작 — 로컬 MySQL 없이도 테스트 가능.
spring.datasource.url=jdbc:h2:mem:pinq_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── JWT (테스트 고정값 — 환경변수와 무관하게 항상 이 값 사용) ───────────────────
jwt.secret=test-only-secret-key-for-unit-tests-must-be-at-least-256-bits-long
jwt.expiration-ms=3600000
