spring.application.name=pinq_backend

# Phase 1 기본값: H2 인메모리. 별도 설정 없이 ./gradlew bootRun 만으로 동작.
# 운영 MySQL 로 띄울 때: --spring.profiles.active=prod
# 로컬 MySQL 로 띄울 때: --spring.profiles.active=local
spring.profiles.active=h2

# JSON 응답에서 timezone/형식 일관성
spring.jackson.time-zone=Asia/Seoul

# Swagger UI 경로 정리
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ── 네이버 검색 API ────────────────────────────────────────────────────────────
# developers.naver.com 에서 발급. 로컬: export NAVER_CLIENT_ID=... NAVER_CLIENT_SECRET=...
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}

# ── OpenAI API ────────────────────────────────────────────────────────────────
# platform.openai.com 에서 발급. 로컬: export OPENAI_API_KEY=sk-...
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# ── Admin API 인증 ─────────────────────────────────────────────────────────────
# /api/admin/** 엔드포인트 접근 시 X-Admin-Secret 헤더로 검증.
# 운영: 충분히 긴 무작위 문자열로 설정할 것 (예: openssl rand -hex 32).
# 미설정(빈 문자열) 시 admin 엔드포인트는 항상 차단된다.
admin.secret=${ADMIN_SECRET:}