spring.application.name=pinq_backend

# Phase 1 기본값: H2 인메모리. 별도 설정 없이 ./gradlew bootRun 만으로 동작.
# 운영 MySQL 로 띄울 때: --spring.profiles.active=prod
# 로컬 MySQL 로 띄울 때: --spring.profiles.active=local
spring.profiles.active=h2

# JSON 응답에서 timezone/형식 일관성
spring.jackson.time-zone=Asia/Seoul

# Swagger UI 경로 정리
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Actuator Health Check 노출 설정
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── 네이버 검색 API ────────────────────────────────────────────────────────────
# developers.naver.com 에서 발급. 로컬: export NAVER_CLIENT_ID=... NAVER_CLIENT_SECRET=...
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}

# ── OpenAI API ────────────────────────────────────────────────────────────────
# platform.openai.com 에서 발급. 로컬: export OPENAI_API_KEY=sk-...
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# ── Admin API 인증 ─────────────────────────────────────────────────────────────
# /api/admin/** 엔드포인트 접근 시 X-Admin-Secret 헤더로 검증.
# 운영: 충분히 긴 무작위 문자열로 설정할 것 (예: openssl rand -hex 32).
# 미설정(빈 문자열) 시 admin 엔드포인트는 항상 차단된다.
admin.secret=${ADMIN_SECRET:}

# ── Google OAuth ──────────────────────────────────────────────────────────────
# Android 앱과 동일한 "웹 애플리케이션" 클라이언트 ID. ID Token 의 aud 검증에 사용.
# 미설정 시 구글 로그인이 전부 거부된다 (토큰 치환 공격 방지를 위한 의도적 fail-secure).
google.web-client-id=${GOOGLE_WEB_CLIENT_ID:}

# ── JWT ───────────────────────────────────────────────────────────────────────
# 운영: export JWT_SECRET=$(openssl rand -hex 32)
# 개발: 기본값으로 동작하지만 운영에서는 반드시 환경변수로 주입할 것.
jwt.secret=${JWT_SECRET:}
# access token 유효기간 (밀리초). 기본 1시간.
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
# ── Anthropic API ─────────────────────────────────────────────────────────────
# console.anthropic.com 에서 발급. 로컬: export ANTHROPIC_API_KEY=sk-ant-...
# 용도: 퀴즈 정답 cross-model 검증 (OpenAI 생성 → Claude 검증).
# 미설정(빈 문자열) 시 검증 호출이 실패하지만 AnthropicVerifyClient가 fail-open으로
# 처리하므로 앱 자체는 기동된다 (검증이 무력화되는 점만 주의).
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5-20251001

# ── Firebase (FCM 푸시) ─────────────────────────────────────────────────────────
# Firebase 콘솔 > 프로젝트 설정 > 서비스 계정 > 비공개 키(JSON) 를 base64 인코딩해 주입.
#   base64 -i service-account.json | tr -d "\\n"  → 그 값을 환경변수로.
# 미설정 시 FCM 전송만 비활성화되고 앱은 정상 기동한다.
firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}
