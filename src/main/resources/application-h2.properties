# MySQL 설치 없이도 바로 띄울 수 있는 Phase 1 데모 프로파일.
# 실행: SPRING_PROFILES_ACTIVE=h2 ./gradlew bootRun
spring.datasource.url=jdbc:h2:mem:pinq;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 브라우저에서 http://localhost:8080/h2-console 로 DB 직접 확인 가능
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
