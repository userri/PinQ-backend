# ── 프록시(nginx)가 SSL 종단 ──────────────────────────────────────────────────
# nginx 가 443 에서 TLS 를 풀고 X-Forwarded-* 헤더를 붙여 8080(HTTP) 으로 전달한다.
# native 로 설정해야 HttpServletRequest#isSecure() / getScheme() 가 https 로 인식되어
# 리다이렉트·쿠키 Secure 플래그가 올바르게 동작한다.
server.forward-headers-strategy=native

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 기본 validate: 기동 시 엔티티와 스키마 일치만 확인하고 절대 스키마를 변경하지 않는다.
# (update 는 배포마다 운영 스키마를 자동 변형해 통제 불가 — 실사용자 데이터가 쌓이면 위험)
# 신규 서버 첫 기동처럼 스키마 생성이 필요할 때만 .env 에 DDL_AUTO=update 를 넣고
# 1회 기동 후 반드시 제거할 것. 이후 스키마 변경은 SQL 수동 적용 또는 Flyway 권장.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── 운영 정보 노출 차단 ────────────────────────────────────────────────────────
# API 문서 엔드포인트 비활성화 — 운영 도메인에서 전체 API 명세가 공개되지 않도록
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
# /actuator/health 는 상태코드만 — DB/Redis/디스크 상세는 익명에게 숨긴다
management.endpoint.health.show-details=never

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# refresh token 만료: 14일(초)
jwt.refresh-expiration-sec=${JWT_REFRESH_EXPIRATION_SEC:1209600}
# access token 만료: 1시간(ms)
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── 외부 API 키 (EC2 환경변수로 주입) ─────────────────────────────────────────
# 미설정 시 빈 문자열 — 해당 기능(네이버 검색, AI 해설)만 비활성화되고 앱은 기동된다.
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
openai.api-key=${OPENAI_API_KEY:}
anthropic.api-key=${ANTHROPIC_API_KEY:}
