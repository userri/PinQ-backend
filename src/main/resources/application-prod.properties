# ── 프록시(nginx)가 SSL 종단 ──────────────────────────────────────────────────
# nginx 가 443 에서 TLS 를 풀고 X-Forwarded-* 헤더를 붙여 8080(HTTP) 으로 전달한다.
# native 로 설정해야 HttpServletRequest#isSecure() / getScheme() 가 https 로 인식되어
# 리다이렉트·쿠키 Secure 플래그가 올바르게 동작한다.
server.forward-headers-strategy=native

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# refresh token 만료: 30일(초)
jwt.refresh-expiration-sec=${JWT_REFRESH_EXPIRATION_SEC:2592000}
# access token 만료: 1시간(ms)
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── 외부 API 키 (EC2 환경변수로 주입) ─────────────────────────────────────────
# 미설정 시 빈 문자열 — 해당 기능(네이버 검색, AI 해설)만 비활성화되고 앱은 기동된다.
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
openai.api-key=${OPENAI_API_KEY:}
anthropic.api-key=${ANTHROPIC_API_KEY:}