# EC2 배포 전용 docker-compose.yml
#
# 로컬 빌드(build: .) 방식이 아닌 Docker Hub 이미지를 받아서 실행한다.
# 이 파일은 EC2의 ~/pinq_backend/ 디렉토리에 위치해야 한다.
#
# 필요한 .env 파일 (~/pinq_backend/.env):
#   DOCKERHUB_USERNAME=your_dockerhub_id
#   DB_HOST=mysql-container   # 또는 MySQL 컨테이너/RDS 호스트명
#   DB_PORT=3306
#   DB_NAME=pinq_db
#   DB_USERNAME=...
#   DB_PASSWORD=...

services:
  app:
    image: ${DOCKERHUB_USERNAME}/pinq-backend:latest
    container_name: pinq-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    networks:
      - resources_default

networks:
  resources_default:
    external: true