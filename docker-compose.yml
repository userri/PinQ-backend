# EC2 배포 및 로컬 Docker 실행 공용 compose 파일.
#
# 필요한 .env 파일:
#   DOCKERHUB_USERNAME=...
#   DB_HOST=mysql-container   # 또는 RDS 호스트
#   DB_PORT=3306
#   DB_NAME=pinq_db
#   DB_USERNAME=...
#   DB_PASSWORD=...
#   JWT_SECRET=<openssl rand -hex 32>
#   ADMIN_SECRET=<openssl rand -hex 32>
#   NAVER_CLIENT_ID=...         # 선택
#   NAVER_CLIENT_SECRET=...     # 선택
#   OPENAI_API_KEY=...          # 선택
#   # ── HTTPS (nginx + Let's Encrypt) ────────────────────────────────────
#   DOMAIN=finq.duckdns.org           # 실제 도메인
#   CERT_EMAIL=you@example.com        # Let's Encrypt 만료 알림 수신
#   DUCKDNS_SUBDOMAIN=finq            # DuckDNS 사용 시
#   DUCKDNS_TOKEN=xxxx-xxxx-...       # DuckDNS 사용 시

x-app-common: &app-common
  image: ${DOCKERHUB_USERNAME}/pinq-backend:${APP_IMAGE_TAG:-latest}
  environment:
    # ── 타임존을 KST 로 고정 (컨테이너 + JVM 양쪽) ──────────────────────────
    # JVM 이 UTC 로 뜨면: 감사 시각은 KST Clock 이 벽시계 23:00 을 만드는데,
    # JDBC 커넥터(serverTimezone=Asia/Seoul)가 이를 "UTC 23:00"으로 해석해
    # +9h 변환 → DB 에 익일 08:00 으로 저장되는 이중 변환 버그가 있었다.
    # JVM 기본 TZ = 커넥션 TZ = KST 로 맞추면 변환이 항등이 되어 근본 차단된다.
    TZ: Asia/Seoul
    JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul"
    SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    DB_HOST: ${DB_HOST}
    DB_PORT: ${DB_PORT:-3306}
    DB_NAME: ${DB_NAME}
    DB_USERNAME: ${DB_USERNAME}
    DB_PASSWORD: ${DB_PASSWORD}
    JWT_SECRET: ${JWT_SECRET}
    JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    JWT_REFRESH_EXPIRATION_SEC: ${JWT_REFRESH_EXPIRATION_SEC:-1209600}
    ADMIN_SECRET: ${ADMIN_SECRET}
    NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
    NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # 퀴즈 정답 cross-model 검증용 — 빠지면 검증이 조용히 비활성화된 채 운영된다
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # 구글 ID Token aud 검증용 — 미설정 시 구글 로그인이 거부된다
    GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
    # FCM 푸시 — Firebase 서비스 계정 JSON 을 base64 인코딩한 값. 미설정 시 푸시만 비활성화
    FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    # 신규 서버 첫 기동 시에만 .env 에 DDL_AUTO=update 로 스키마 생성 후 제거 (기본 validate)
    DDL_AUTO: ${DDL_AUTO:-validate}
    REDIS_HOST: pinq-redis
  restart: unless-stopped
  depends_on:
    - redis
  networks:
    - resources_default

services:
  redis:
    image: redis:7-alpine
    container_name: pinq-redis
    restart: unless-stopped
    networks:
      - resources_default

  app-blue:
    <<: *app-common
    container_name: pinq-app-blue
    expose:
      - "8080"

  app-green:
    <<: *app-common
    container_name: pinq-app-green
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: pinq-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      # :? — DOMAIN 이 없으면 compose 가 기동을 거부한다.
      # 없이 뜨면 nginx 가 TLS 없는 HTTP 로 조용히 폴백해 전체 트래픽이 평문이 된다.
      DOMAIN: ${DOMAIN:?DOMAIN is required (e.g. finq.duckdns.org) — without it nginx silently falls back to plain HTTP}
      # 도메인 이전용 (선택): 함께 서빙할 추가 도메인(공백 구분) / certbot 인증서 계보 이름
      EXTRA_DOMAINS: ${EXTRA_DOMAINS:-}
      CERT_NAME: ${CERT_NAME:-}
    # 배포 디렉터리에 아래 nginx 템플릿/엔트리포인트 파일이 함께 있어야 한다.
    # deploy.sh 가 누락 여부를 사전에 검사한다.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.legacy:ro
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./nginx/entrypoint.sh:/pinq/entrypoint.sh:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # 직접 entrypoint 스크립트 실행: envsubst 로 도메인 치환 → 6h 주기 reload loop → nginx foreground
    command: ["/bin/sh", "/pinq/entrypoint.sh"]
    restart: unless-stopped
    # depends_on 없음(의도적): nginx 는 컨테이너 이름으로 프록시하므로 앱 의존 선언이
    # 불필요하고, 선언하면 nginx 재생성 시 대기 슬롯까지 깨워 1GB 램에 앱이 2개 뜬다.
    networks:
      - resources_default

  # ── Let's Encrypt 인증서 자동 갱신 ─────────────────────────────────────
  # 12시간마다 certbot renew 시도. 만료 30일 이내일 때만 실제 갱신이 일어남.
  # 갱신된 인증서는 nginx 컨테이너가 6시간마다 reload 하며 자동 반영.
  certbot:
    image: certbot/certbot
    container_name: pinq-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  # ── MySQL — 독립 컨테이너에서 compose 편입 (2026-07-19) ─────────────────
  # 원래 초기 셋업 때 docker run 으로 띄운 컨테이너였음. IntelliJ 등 로컬 도구의
  # SSH 터널 접속을 위해 루프백 한정 포트를 열면서 compose 관리로 정식 편입.
  #
  # ⚠️ 최초 1회 전환 절차 (데이터는 mysql-data 볼륨에 있어 안전):
  #   docker rm -f mysql-container && docker compose up -d mysql
  #   (10~20초 DB 중단 — 앱은 HikariCP 가 자동 재접속. 한산한 시간에 실행)
  #
  # MYSQL_* 환경변수는 데이터 볼륨이 비어 있을 때(최초 초기화)만 적용되므로
  # 기존 볼륨 인수 시에는 값이 달라도 무해하다.
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    ports:
      # 루프백 한정 — 서버 안에서만 접속 가능. 외부(0.0.0.0) 노출 아님.
      # 로컬 IntelliJ 는 SSH 터널로 localhost:3306 에 붙는다.
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-pinq_db}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - resources_default

volumes:
  # 기존 독립 컨테이너가 쓰던 볼륨을 그대로 인수 (external — compose 가 생성/삭제하지 않음)
  mysql-data:
    external: true

networks:
  resources_default:
    external: true
